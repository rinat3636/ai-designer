groups:
  - name: ai-designer
    rules:
      - alert: High524ErrorRate
        expr: |
          (
            sum(rate(chat_requests_total{error_type="524"}[5m]))
            /
            sum(rate(chat_requests_total[5m]))
          ) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High 524 error rate in /api/chat"
          description: "More than 5% of /api/chat requests returned error 524 in the last 5 minutes."

      - alert: HighResponseDuration
        expr: histogram_quantile(0.95, rate(chat_response_duration_ms_bucket[5m])) > 120000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow /api/chat responses"
          description: "95th percentile response duration is above 2 minutes."
