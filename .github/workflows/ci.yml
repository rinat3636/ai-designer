name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      APP_SECRET: ci-only-secret-32-chars-abcdef123456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma db push
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
